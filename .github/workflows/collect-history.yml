name: collect-price-history

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Collect price history
        run: |
          set -euo pipefail
          output="$(npm run collect:history)"
          echo "$output"
          summary_line="$(printf '%s\n' "$output" | tail -n 1)"
          {
            echo "## collect-price-history"
            echo
            echo '```json'
            echo "$summary_line"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
